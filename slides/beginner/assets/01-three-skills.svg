<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">The three skills you learn in Module 01</title>
  <desc id="desc">Three rounded cards connected by arrows: open Claude Code, send one prompt, save the reply.</desc>

  <defs>
    <style>
      .ink { fill: #1B1B1F; }
      .bg { fill: #FAF7F2; }
      .muted { fill: #5A5A66; }
      .accent { fill: #D9531E; }
      .accent-soft { fill: #FCE6DA; }
      .stroke-ink { fill: none; stroke: #1B1B1F; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .stroke-accent { fill: none; stroke: #D9531E; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      text { font-family: Inter, "Helvetica Neue", Arial, sans-serif; font-weight: 600; }
      .label { font-size: 24px; fill: #1B1B1F; }
      .step { font-size: 13px; fill: #5A5A66; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 700; }
    </style>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1B1B1F"/>
    </marker>
  </defs>

  <!-- Card 1: Open Claude Code -->
  <g transform="translate(40,80)">
    <rect class="accent-soft" width="240" height="200" rx="16"/>
    <rect class="stroke-ink" width="240" height="200" rx="16"/>
    <text class="step" x="20" y="36">Skill 1</text>
    <!-- terminal glyph -->
    <g transform="translate(20,52)">
      <rect class="bg" width="200" height="80" rx="8"/>
      <rect class="stroke-ink" width="200" height="80" rx="8"/>
      <text x="12" y="48" font-family='JetBrains Mono, monospace' font-size="22" fill="#1B1B1F">$ claude</text>
    </g>
    <text class="label" x="20" y="160">Open Claude</text>
    <text class="label" x="20" y="188">Code</text>
  </g>

  <!-- Arrow 1 → 2 -->
  <path class="stroke-ink" d="M 290 180 L 350 180" marker-end="url(#arrowhead)"/>

  <!-- Card 2: Send one prompt -->
  <g transform="translate(360,80)">
    <rect class="accent-soft" width="240" height="200" rx="16"/>
    <rect class="stroke-ink" width="240" height="200" rx="16"/>
    <text class="step" x="20" y="36">Skill 2</text>
    <!-- speech bubble -->
    <g transform="translate(20,52)">
      <rect class="bg" width="200" height="80" rx="40"/>
      <rect class="stroke-accent" width="200" height="80" rx="40"/>
      <path class="stroke-accent" d="M 60 80 L 56 96 L 80 80 Z" fill="#D9531E"/>
      <text x="22" y="42" font-family='Inter, sans-serif' font-size="18" fill="#1B1B1F" font-style="italic">Reply with one</text>
      <text x="22" y="62" font-family='Inter, sans-serif' font-size="18" fill="#1B1B1F" font-style="italic">sentence…</text>
    </g>
    <text class="label" x="20" y="170">Send one prompt</text>
  </g>

  <!-- Arrow 2 → 3 -->
  <path class="stroke-ink" d="M 610 180 L 670 180" marker-end="url(#arrowhead)"/>

  <!-- Card 3: Save the reply -->
  <g transform="translate(680,80)">
    <rect class="accent-soft" width="240" height="200" rx="16"/>
    <rect class="stroke-ink" width="240" height="200" rx="16"/>
    <text class="step" x="20" y="36">Skill 3</text>
    <!-- file glyph -->
    <g transform="translate(20,52)">
      <path class="bg" d="M 0 0 L 140 0 L 160 24 L 160 80 L 0 80 Z" />
      <path class="stroke-ink" d="M 0 0 L 140 0 L 160 24 L 160 80 L 0 80 Z" />
      <path class="stroke-ink" d="M 140 0 L 140 24 L 160 24" />
      <text x="14" y="52" font-family='JetBrains Mono, monospace' font-size="16" fill="#1B1B1F">first-prompt.txt</text>
    </g>
    <text class="label" x="20" y="160">Save the reply</text>
    <text class="label" x="20" y="188">to a file</text>
  </g>
</svg>
