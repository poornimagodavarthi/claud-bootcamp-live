<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" role="img" aria-labelledby="title desc">
  <title id="title">The four-step safe-edit loop</title>
  <desc id="desc">Four stations on a track labelled commit, ask, read diff, decide. A dashed return arrow shows that git restore returns you to the start.</desc>
  <defs>
    <style>
      .ink { fill: #1B1B1F; } .accent { fill: #D9531E; } .accent-soft { fill: #FCE6DA; } .bg { fill: #FAF7F2; }
      .success { fill: #1F7A4D; }
      .stroke-ink { fill: none; stroke: #1B1B1F; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .stroke-accent { fill: none; stroke: #D9531E; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .dashed { stroke-dasharray: 6 6; }
      text { font-family: Inter, sans-serif; font-weight: 700; fill: #1B1B1F; text-anchor: middle; }
      .lbl { font-size: 18px; }
      .num { font-size: 16px; fill: #FAF7F2; }
      .sub { font-size: 13px; fill: #5A5A66; font-weight: 600; }
      .mono { font-family: 'JetBrains Mono', monospace; font-size: 13px; fill: #5A5A66; font-weight: 600; }
    </style>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1B1B1F"/>
    </marker>
    <marker id="aha" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D9531E"/>
    </marker>
  </defs>

  <!-- track -->
  <line class="stroke-ink" x1="100" y1="140" x2="860" y2="140"/>

  <!-- stations -->
  <g transform="translate(80,140)">
    <circle r="40" class="ink"/>
    <text y="6" class="num">1</text>
    <text y="80" class="lbl">Commit</text>
    <text y="104" class="mono">git commit</text>
  </g>
  <g transform="translate(300,140)">
    <circle r="40" class="accent-soft"/>
    <circle r="40" class="stroke-ink"/>
    <text y="6" class="lbl">2</text>
    <text y="80" class="lbl">Ask for edit</text>
    <text y="104" class="sub">one file, one ask</text>
  </g>
  <g transform="translate(560,140)">
    <circle r="40" class="accent-soft"/>
    <circle r="40" class="stroke-ink"/>
    <text y="6" class="lbl">3</text>
    <text y="80" class="lbl">Read the diff</text>
    <text y="104" class="sub">+ added · − removed</text>
  </g>
  <g transform="translate(840,140)">
    <circle r="40" class="ink"/>
    <text y="6" class="num">4</text>
    <text y="80" class="lbl">Decide</text>
    <text y="104" class="sub">accept · reject · restore</text>
  </g>

  <!-- forward arrows -->
  <path class="stroke-ink" d="M 130 140 L 250 140" marker-end="url(#ah)"/>
  <path class="stroke-ink" d="M 350 140 L 510 140" marker-end="url(#ah)"/>
  <path class="stroke-ink" d="M 610 140 L 790 140" marker-end="url(#ah)"/>

  <!-- restore arrow back to station 1 -->
  <path class="stroke-accent dashed" d="M 840 100 Q 840 30 80 30 L 80 90" marker-end="url(#aha)"/>
  <text x="460" y="22" font-size="14" font-weight="700" fill="#D9531E">git restore — one command, all the way back</text>
</svg>
