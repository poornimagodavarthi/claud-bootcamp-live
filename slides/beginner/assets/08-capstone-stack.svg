<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" role="img" aria-labelledby="title desc">
  <title id="title">The capstone stack: skills from earlier modules combine into one CLI</title>
  <desc id="desc">A stair-step diagram showing Modules 02, 03, 05 and 06 stacking up to deliver the notes.py capstone graded by a script that prints PASS plus a token.</desc>
  <defs>
    <style>
      .ink { fill: #1B1B1F; } .accent { fill: #D9531E; } .accent-soft { fill: #FCE6DA; } .bg { fill: #FAF7F2; }
      .success { fill: #1F7A4D; }
      .stroke-ink { fill: none; stroke: #1B1B1F; stroke-width: 2.5; }
      .stroke-accent { fill: none; stroke: #D9531E; stroke-width: 2.5; }
      text { font-family: Inter, sans-serif; fill: #1B1B1F; }
      .mod { font-size: 13px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; fill: #5A5A66; }
      .skill { font-size: 18px; font-weight: 700; }
      .res { font-size: 22px; font-weight: 700; fill: #FAF7F2; }
      .mono { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700; }
    </style>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1B1B1F"/>
    </marker>
  </defs>

  <!-- four stair steps -->
  <g transform="translate(40,260)">
    <rect width="180" height="40" rx="10" class="accent-soft"/>
    <rect width="180" height="40" rx="10" class="stroke-ink"/>
    <text x="14" y="18" class="mod">Module 06</text>
    <text x="14" y="34" class="skill">CLAUDE.md</text>
  </g>
  <g transform="translate(40,200)">
    <rect width="180" height="40" rx="10" class="accent-soft"/>
    <rect width="180" height="40" rx="10" class="stroke-ink"/>
    <text x="14" y="18" class="mod">Module 03</text>
    <text x="14" y="34" class="skill">Sharp prompt</text>
  </g>
  <g transform="translate(40,140)">
    <rect width="180" height="40" rx="10" class="accent-soft"/>
    <rect width="180" height="40" rx="10" class="stroke-ink"/>
    <text x="14" y="18" class="mod">Module 02</text>
    <text x="14" y="34" class="skill">Multi-turn chat</text>
  </g>
  <g transform="translate(40,80)">
    <rect width="180" height="40" rx="10" class="accent-soft"/>
    <rect width="180" height="40" rx="10" class="stroke-ink"/>
    <text x="14" y="18" class="mod">Module 05</text>
    <text x="14" y="34" class="skill">Safe edit + Git</text>
  </g>

  <!-- arrow -->
  <path class="stroke-ink" d="M 240 170 L 380 170" marker-end="url(#ah)"/>

  <!-- middle: notes.py -->
  <g transform="translate(390,80)">
    <rect width="240" height="220" rx="16" class="bg"/>
    <rect width="240" height="220" rx="16" class="stroke-accent"/>
    <text x="20" y="36" class="mod">Capstone</text>
    <text x="20" y="68" class="skill">notes.py</text>
    <text x="20" y="110" class="mono">add</text>
    <text x="20" y="140" class="mono">list</text>
    <text x="20" y="170" class="mono">delete</text>
    <text x="20" y="200" font-size="13" fill="#5A5A66" font-weight="700">persists in notes.json</text>
  </g>

  <!-- arrow -->
  <path class="stroke-ink" d="M 650 190 L 730 190" marker-end="url(#ah)"/>

  <!-- right: PASS token -->
  <g transform="translate(740,120)">
    <rect width="180" height="140" rx="16" fill="#1B1B1F"/>
    <rect width="180" height="140" rx="16" class="stroke-ink"/>
    <text x="20" y="44" font-size="14" fill="#FCE6DA" font-weight="700">grader prints</text>
    <text x="20" y="84" class="res" fill="#1F7A4D">PASS</text>
    <text x="20" y="118" class="mono" fill="#FAF7F2">abc12345</text>
  </g>
</svg>
