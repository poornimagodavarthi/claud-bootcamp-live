<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" role="img" aria-labelledby="title desc">
  <title id="title">Each prompt sees everything you said before</title>
  <desc id="desc">A horizontal session timeline with three turns. Each turn is a small message bubble and an arrow shows that turn N can see turns 1 through N-1.</desc>
  <defs>
    <style>
      .ink { fill: #1B1B1F; } .muted { fill: #5A5A66; } .accent { fill: #D9531E; } .accent-soft { fill: #FCE6DA; } .bg { fill: #FAF7F2; }
      .stroke-ink { fill: none; stroke: #1B1B1F; stroke-width: 2.5; stroke-linecap: round; }
      .stroke-accent { fill: none; stroke: #D9531E; stroke-width: 2.5; stroke-linecap: round; }
      .dashed { stroke-dasharray: 6 6; }
      text { font-family: Inter, sans-serif; font-weight: 600; fill: #1B1B1F; }
      .lbl { font-size: 20px; }
      .step { font-size: 12px; fill: #5A5A66; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; }
    </style>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D9531E"/>
    </marker>
  </defs>
  <!-- session container -->
  <rect x="30" y="40" width="900" height="240" rx="20" class="accent-soft"/>
  <rect x="30" y="40" width="900" height="240" rx="20" class="stroke-ink"/>
  <text x="50" y="72" class="step">One session · /exit ends it</text>

  <!-- Turn 1 -->
  <g transform="translate(70,110)">
    <rect width="220" height="120" rx="14" class="bg"/>
    <rect width="220" height="120" rx="14" class="stroke-ink"/>
    <text x="16" y="32" class="step">Turn 1</text>
    <text x="16" y="64" class="lbl">List 3 reasons</text>
    <text x="16" y="92" class="lbl">to learn Git.</text>
  </g>
  <!-- Turn 2 -->
  <g transform="translate(370,110)">
    <rect width="220" height="120" rx="14" class="bg"/>
    <rect width="220" height="120" rx="14" class="stroke-ink"/>
    <text x="16" y="32" class="step">Turn 2</text>
    <text x="16" y="64" class="lbl">Shorter.</text>
    <text x="16" y="92" class="lbl">One line each.</text>
  </g>
  <!-- Turn 3 -->
  <g transform="translate(670,110)">
    <rect width="220" height="120" rx="14" class="bg"/>
    <rect width="220" height="120" rx="14" class="stroke-ink"/>
    <text x="16" y="32" class="step">Turn 3</text>
    <text x="16" y="64" class="lbl">Turn that into</text>
    <text x="16" y="92" class="lbl">a tweet.</text>
  </g>

  <!-- Memory arrows: turn 2 sees turn 1; turn 3 sees turn 1 + 2 -->
  <path class="stroke-accent dashed" d="M 290 170 L 370 170" marker-end="url(#ah)"/>
  <path class="stroke-accent dashed" d="M 590 170 L 670 170" marker-end="url(#ah)"/>
  <path class="stroke-accent dashed" d="M 180 230 Q 480 280 770 230" marker-end="url(#ah)"/>

  <text x="50" y="300" class="step">Dashed arrow = "remembers"</text>
</svg>
