<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" role="img" aria-labelledby="title desc">
  <title id="title">Three categories you never paste into Claude</title>
  <desc id="desc">Three stacked cards each show a forbidden category — secret, PII, proprietary — and the safe substitute to use instead.</desc>
  <defs>
    <style>
      .ink { fill: #1B1B1F; } .accent { fill: #D9531E; } .accent-soft { fill: #FCE6DA; } .bg { fill: #FAF7F2; }
      .danger { fill: #9A2B2B; } .success { fill: #1F7A4D; }
      .stroke-ink { fill: none; stroke: #1B1B1F; stroke-width: 2.5; }
      .stroke-danger { fill: none; stroke: #9A2B2B; stroke-width: 2.5; }
      .stroke-success { fill: none; stroke: #1F7A4D; stroke-width: 2.5; }
      text { font-family: Inter, sans-serif; fill: #1B1B1F; }
      .lbl { font-size: 20px; font-weight: 700; }
      .sub { font-size: 14px; font-weight: 600; fill: #5A5A66; }
      .mono { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; }
      .step { font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; }
    </style>
  </defs>

  <!-- row 1: Secret -->
  <g transform="translate(40,30)">
    <rect width="420" height="80" rx="12" fill="#FBE6E6"/>
    <rect width="420" height="80" rx="12" class="stroke-danger"/>
    <text x="16" y="28" class="step" fill="#9A2B2B">Never paste · Secret</text>
    <text x="16" y="56" class="mono" fill="#9A2B2B">API_KEY=sk-real-token-xxx</text>
    <text x="16" y="74" class="sub">key · password · token</text>
  </g>
  <text x="490" y="76" font-size="28" font-weight="700">→</text>
  <g transform="translate(530,30)">
    <rect width="390" height="80" rx="12" fill="#E6F2EC"/>
    <rect width="390" height="80" rx="12" class="stroke-success"/>
    <text x="16" y="28" class="step" fill="#1F7A4D">Use instead</text>
    <text x="16" y="56" class="mono" fill="#1F7A4D">API_KEY=EXAMPLE_KEY</text>
    <text x="16" y="74" class="sub">obvious placeholder</text>
  </g>

  <!-- row 2: PII -->
  <g transform="translate(40,130)">
    <rect width="420" height="80" rx="12" fill="#FBE6E6"/>
    <rect width="420" height="80" rx="12" class="stroke-danger"/>
    <text x="16" y="28" class="step" fill="#9A2B2B">Never paste · PII</text>
    <text x="16" y="56" class="mono" fill="#9A2B2B">Jane Doe · jane@acme.com</text>
    <text x="16" y="74" class="sub">real name · email · phone · address</text>
  </g>
  <text x="490" y="176" font-size="28" font-weight="700">→</text>
  <g transform="translate(530,130)">
    <rect width="390" height="80" rx="12" fill="#E6F2EC"/>
    <rect width="390" height="80" rx="12" class="stroke-success"/>
    <text x="16" y="28" class="step" fill="#1F7A4D">Use instead</text>
    <text x="16" y="56" class="mono" fill="#1F7A4D">Alice · alice@example.com</text>
    <text x="16" y="74" class="sub">obvious fake</text>
  </g>

  <!-- row 3: Proprietary -->
  <g transform="translate(40,230)">
    <rect width="420" height="80" rx="12" fill="#FBE6E6"/>
    <rect width="420" height="80" rx="12" class="stroke-danger"/>
    <text x="16" y="28" class="step" fill="#9A2B2B">Never paste · Proprietary / NDA</text>
    <text x="16" y="56" class="mono" fill="#9A2B2B">customer source · designs · roadmap</text>
    <text x="16" y="74" class="sub">code or info you don't own</text>
  </g>
  <text x="490" y="276" font-size="28" font-weight="700">→</text>
  <g transform="translate(530,230)">
    <rect width="390" height="80" rx="12" fill="#E6F2EC"/>
    <rect width="390" height="80" rx="12" class="stroke-success"/>
    <text x="16" y="28" class="step" fill="#1F7A4D">Use instead</text>
    <text x="16" y="56" class="lbl" fill="#1F7A4D">Describe the shape</text>
    <text x="16" y="74" class="sub">"a 50-line auth handler in Go"</text>
  </g>
</svg>
