<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" role="img" aria-labelledby="title desc">
  <title id="title">Claude only sees what you paste</title>
  <desc id="desc">A file icon on the left points into a chat bubble in the middle, which points to a plain-English explanation on the right.</desc>
  <defs>
    <style>
      .ink { fill: #1B1B1F; } .accent { fill: #D9531E; } .accent-soft { fill: #FCE6DA; } .bg { fill: #FAF7F2; }
      .stroke-ink { fill: none; stroke: #1B1B1F; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      text { font-family: Inter, sans-serif; font-weight: 600; fill: #1B1B1F; }
      .mono { font-family: 'JetBrains Mono', monospace; font-size: 14px; }
      .step { font-size: 13px; fill: #5A5A66; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 700; }
      .lbl { font-size: 20px; }
    </style>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1B1B1F"/>
    </marker>
  </defs>

  <!-- File -->
  <g transform="translate(50,80)">
    <text x="0" y="-10" class="step">You paste</text>
    <path class="accent-soft" d="M 0 0 L 140 0 L 180 36 L 180 180 L 0 180 Z"/>
    <path class="stroke-ink" d="M 0 0 L 140 0 L 180 36 L 180 180 L 0 180 Z"/>
    <path class="stroke-ink" d="M 140 0 L 140 36 L 180 36"/>
    <text x="14" y="68" class="mono">#!/bin/bash</text>
    <text x="14" y="92" class="mono">for f in *.log;</text>
    <text x="14" y="116" class="mono">do echo $f; done</text>
    <text x="14" y="158" class="step">script.sh</text>
  </g>

  <!-- Arrow -->
  <path class="stroke-ink" d="M 250 170 L 360 170" marker-end="url(#ah)"/>

  <!-- Claude -->
  <g transform="translate(370,80)">
    <text x="0" y="-10" class="step">Claude reads</text>
    <rect width="200" height="180" rx="100" class="bg"/>
    <rect width="200" height="180" rx="100" class="stroke-ink"/>
    <text x="100" y="80" class="lbl" text-anchor="middle">Reads</text>
    <text x="100" y="110" class="lbl" text-anchor="middle">only what</text>
    <text x="100" y="140" class="lbl" text-anchor="middle">you paste</text>
  </g>

  <!-- Arrow -->
  <path class="stroke-ink" d="M 590 170 L 700 170" marker-end="url(#ah)"/>

  <!-- Explanation -->
  <g transform="translate(710,80)">
    <text x="0" y="-10" class="step">You get</text>
    <rect width="200" height="180" rx="14" fill="#1B1B1F"/>
    <rect width="200" height="180" rx="14" class="stroke-ink"/>
    <text x="16" y="44" fill="#FAF7F2" font-family="Inter,sans-serif" font-size="16">Plain English,</text>
    <text x="16" y="68" fill="#FAF7F2" font-family="Inter,sans-serif" font-size="16">line by line —</text>
    <text x="16" y="92" fill="#D9531E" font-family="Inter,sans-serif" font-size="16">with your names</text>
    <text x="16" y="116" fill="#D9531E" font-family="Inter,sans-serif" font-size="16">in your file.</text>
    <text x="16" y="156" fill="#FAF7F2" font-family="Inter,sans-serif" font-size="13" font-style="italic">No filesystem access yet.</text>
  </g>
</svg>
