<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" font-family="Comic Sans MS, Caveat, cursive">
  <rect x="0" y="0" width="1280" height="720" fill="#fefefe"/>

  <!-- header -->
  <rect x="20" y="20" width="1240" height="80" fill="none" stroke="#222" stroke-width="3" rx="6"/>
  <text x="50" y="70" font-size="32" fill="#222">Dashboard</text>
  <rect x="1080" y="40" width="160" height="40" fill="none" stroke="#222" stroke-width="3" rx="6"/>
  <text x="1100" y="68" font-size="20" fill="#222">+ New Note</text>

  <!-- sidebar -->
  <rect x="20" y="120" width="240" height="540" fill="none" stroke="#222" stroke-width="3" rx="6"/>
  <text x="50" y="170" font-size="24" fill="#222">Overview</text>
  <text x="50" y="220" font-size="24" fill="#222">Notes</text>
  <text x="50" y="270" font-size="24" fill="#222">Tasks</text>
  <text x="50" y="320" font-size="24" fill="#222">Reports</text>
  <text x="50" y="370" font-size="24" fill="#222">Settings</text>

  <!-- KPIs -->
  <rect x="280" y="120" width="320" height="120" fill="none" stroke="#222" stroke-width="3" rx="6"/>
  <text x="310" y="170" font-size="22" fill="#222">KPI 1</text>
  <text x="310" y="210" font-size="36" fill="#222">128</text>

  <rect x="620" y="120" width="320" height="120" fill="none" stroke="#222" stroke-width="3" rx="6"/>
  <text x="650" y="170" font-size="22" fill="#222">KPI 2</text>
  <text x="650" y="210" font-size="36" fill="#222">42</text>

  <rect x="960" y="120" width="300" height="120" fill="none" stroke="#222" stroke-width="3" rx="6"/>
  <text x="990" y="170" font-size="22" fill="#222">KPI 3</text>
  <text x="990" y="210" font-size="36" fill="#222">7d</text>

  <!-- Table -->
  <rect x="280" y="260" width="980" height="380" fill="none" stroke="#222" stroke-width="3" rx="6"/>
  <text x="310" y="300" font-size="22" fill="#222">Recent items</text>
  <line x1="310" y1="320" x2="1230" y2="320" stroke="#222" stroke-width="2"/>
  <text x="320" y="360" font-size="20" fill="#222">Row 1 ............................................. value</text>
  <text x="320" y="410" font-size="20" fill="#222">Row 2 ............................................. value</text>
  <text x="320" y="460" font-size="20" fill="#222">Row 3 ............................................. value</text>
  <text x="320" y="510" font-size="20" fill="#222">Row 4 ............................................. value</text>
  <text x="320" y="560" font-size="20" fill="#222">Row 5 ............................................. value</text>

  <!-- Footer -->
  <rect x="20" y="680" width="1240" height="30" fill="none" stroke="#222" stroke-width="2" rx="4"/>
  <text x="50" y="700" font-size="14" fill="#222">v1.0.0</text>
</svg>
